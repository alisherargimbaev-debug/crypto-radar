<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Trading</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #1a1a2e);
    color: var(--tg-theme-text-color, #eee);
    padding: 12px;
    min-height: 100vh;
  }
  .header { text-align: center; margin-bottom: 16px; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.6; margin-top: 4px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-card .value {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat-card .label {
    font-size: 11px;
    opacity: 0.5;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .green { color: #10b981; }
  .red { color: #ef4444; }
  .yellow { color: #f59e0b; }
  .blue { color: #3b82f6; }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.5;
    margin: 16px 0 8px;
  }

  .strat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 6px;
  }
  .strat-name { font-size: 13px; font-weight: 500; flex: 1; }
  .strat-stats { font-size: 12px; opacity: 0.7; margin-right: 10px; }
  .wr-badge {
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }
  .wr-good { background: rgba(16,185,129,0.2); color: #10b981; }
  .wr-ok   { background: rgba(245,158,11,0.2); color: #f59e0b; }
  .wr-bad  { background: rgba(239,68,68,0.2);  color: #ef4444; }

  .trade-row {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 9px 12px;
    margin-bottom: 5px;
    gap: 8px;
  }
  .trade-coin { font-weight: 700; font-size: 13px; min-width: 52px; }
  .trade-dir  { font-size: 11px; padding: 2px 6px; border-radius: 6px; }
  .long-badge  { background: rgba(16,185,129,0.2); color: #10b981; }
  .short-badge { background: rgba(239,68,68,0.2);  color: #ef4444; }
  .trade-info { flex: 1; font-size: 11px; opacity: 0.6; }
  .trade-pnl  { font-weight: 700; font-size: 13px; }
  .outcome-tp1, .outcome-tp2 { color: #10b981; }
  .outcome-sl  { color: #ef4444; }
  .outcome-exp { color: #6b7280; }

  .open-row {
    display: flex;
    align-items: center;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    padding: 9px 12px;
    margin-bottom: 5px;
    gap: 8px;
  }
  .open-age { font-size: 11px; opacity: 0.5; }

  .empty { text-align: center; opacity: 0.4; padding: 20px; font-size: 13px; }
  .observe-badge {
    display: inline-block;
    background: rgba(59,130,246,0.2);
    color: #3b82f6;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    margin-top: 6px;
  }
  .loading { text-align: center; padding: 40px; opacity: 0.5; }

  .refresh-btn {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 12px;
    color: inherit;
    font-size: 14px;
    cursor: pointer;
    margin-top: 16px;
  }
  .refresh-btn:active { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div class="header">
  <h1>📄 Paper Trading</h1>
  <p id="subtitle">Загрузка...</p>
</div>

<div id="content"><div class="loading">⏳ Загружаю данные...</div></div>

<button class="refresh-btn" onclick="loadData()">🔄 Обновить</button>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// Получаем URL бота из параметров или используем относительный
const BASE = '';

async function loadData() {
  try {
    const res  = await fetch(BASE + '/api/paper');
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="empty">❌ Не удалось загрузить данные<br>' + e.message + '</div>';
  }
}

function render(data) {
  const s = data.stats;
  const sub = document.getElementById('subtitle');
  sub.innerHTML = data.observeMode
    ? '<span class="observe-badge">👁 Режим наблюдения активен</span>'
    : 'Реальная торговля';

  let html = '';

  // Stats grid
  if (s) {
    const pnlColor = s.totalPnl >= 0 ? 'green' : 'red';
    const wrColor  = s.wr >= 55 ? 'green' : s.wr >= 40 ? 'yellow' : 'red';
    html += `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="value ${wrColor}">${s.wr}%</div>
          <div class="label">Win Rate</div>
        </div>
        <div class="stat-card">
          <div class="value ${pnlColor}">${s.totalPnl >= 0 ? '+' : ''}${s.totalPnl}%</div>
          <div class="label">Total PnL</div>
        </div>
        <div class="stat-card">
          <div class="value blue">${s.total}</div>
          <div class="label">Закрыто</div>
        </div>
        <div class="stat-card">
          <div class="value">${data.open.length}</div>
          <div class="label">Открыто</div>
        </div>
      </div>`;

    // Strategies
    const strats = Object.entries(s.byStrat)
      .map(([name, v]) => {
        const total = v.wins + v.losses + v.expired;
        const wr    = total ? Math.round(v.wins / total * 100) : 0;
        return { name, ...v, total, wr };
      })
      .sort((a, b) => b.wr - a.wr);

    if (strats.length) {
      html += '<div class="section-title">По стратегиям</div>';
      for (const st of strats) {
        const badgeClass = st.wr >= 55 ? 'wr-good' : st.wr >= 40 ? 'wr-ok' : 'wr-bad';
        const shortName  = st.name.replace(/[0-9️⃣]/g, '').trim().split(' ').slice(0,2).join(' ');
        const pnlStr     = (st.pnl >= 0 ? '+' : '') + st.pnl.toFixed(1) + '%';
        html += `
          <div class="strat-row">
            <div class="strat-name">${st.name.split(' ').slice(0,2).join(' ')}</div>
            <div class="strat-stats">${st.wins}W / ${st.losses}L</div>
            <div class="wr-badge ${badgeClass}">${st.wr}%</div>
          </div>`;
      }
    }
  } else {
    html += '<div class="empty">📭 Нет данных<br>Включи /observe чтобы начать сбор</div>';
  }

  // Open trades
  if (data.open.length) {
    html += '<div class="section-title">Открытые (' + data.open.length + ')</div>';
    for (const t of data.open) {
      const coin = t.instId.replace('-USDT-SWAP', '');
      const dir  = t.direction === 'long' ? 'long-badge' : 'short-badge';
      const dirT = t.direction === 'long' ? '▲ LONG' : '▼ SHORT';
      html += `
        <div class="open-row">
          <div class="trade-coin">${coin}</div>
          <div class="trade-dir ${dir}">${dirT}</div>
          <div class="trade-info">$${t.price} · ${t.ageMin}м · ${t.confidence}%</div>
        </div>`;
    }
  }

  // Recent closed
  const recent = data.closed.slice(0, 20);
  if (recent.length) {
    html += '<div class="section-title">Последние сделки</div>';
    for (const t of recent) {
      const coin    = t.instId.replace('-USDT-SWAP', '');
      const dir     = t.direction === 'long' ? 'long-badge' : 'short-badge';
      const dirT    = t.direction === 'long' ? '▲' : '▼';
      const pnlStr  = t.pnl !== null ? (t.pnl >= 0 ? '+' : '') + t.pnl.toFixed(2) + '%' : '';
      const pnlCls  = t.pnl > 0 ? 'green' : t.pnl < 0 ? 'red' : '';
      const outIcon = t.outcome === 'tp1' || t.outcome === 'tp2' ? '✅' :
                      t.outcome === 'sl' ? '❌' : '⏰';
      html += `
        <div class="trade-row">
          <div class="trade-coin">${coin}</div>
          <div class="trade-dir ${dir}">${dirT}</div>
          <div class="trade-info">${outIcon} ${t.outcome?.toUpperCase()}</div>
          <div class="trade-pnl ${pnlCls}">${pnlStr}</div>
        </div>`;
    }
  }

  document.getElementById('content').innerHTML = html;
}

loadData();
// Автообновление каждые 30 секунд
setInterval(loadData, 30000);
</script>
</body>
</html>
